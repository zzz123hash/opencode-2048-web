<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <div class="label">SCORE</div>
                <div class="score" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">BEST</div>
                <div class="score" id="best">0</div>
            </div>
        </div>
        <div class="controls">
            <p class="instructions">Use arrow keys to move tiles.</p>
            <button id="restart-btn">Restart</button>
        </div>
        <div class="game-container">
            <div class="grid-background">
                <!-- 4x4 grid cells -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div class="tiles-container" id="tiles-container">
                <!-- Tiles will be dynamically added here -->
            </div>
        </div>
        <div class="game-message" id="game-message">
            <div class="message-content">
                <p id="message-text">Game Over!</p>
                <button id="retry-btn">Try Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
